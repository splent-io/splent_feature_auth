[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_auth"
version = "1.2.3"
requires-python = ">=3.13"
authors = [{ name = "DiversoLab", email = "diversolab@us.es" }]
dependencies = [
    "email_validator"
]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

# ── Feature Contract (auto-generated by splent feature:release) ───────────────
# Do not edit manually — re-run `splent feature:release` to refresh.
[tool.splent.contract]
description = "Authentication feature: registration, login, logout, and session management"

[tool.splent.contract.provides]
routes     = ["/login", "/logout", "/signup/"]
blueprints = ["auth_bp"]
models     = ["User"]
commands   = []
hooks      = ["layout.anonymous_sidebar", "layout.authenticated_sidebar"]
services   = ["AuthenticationService"]
docker     = []

[tool.splent.contract.requires]
features = ["confirmemail", "profile"]
env_vars = []
