[tool.splent.contract]
description = "Authentication feature: registration, login, logout, and session management"

[tool.splent.contract.provides]
routes     = ["/login", "/logout", "/signup/"]
blueprints = ["auth_bp"]
models     = ["User"]
commands   = []
hooks      = ["layout.anonymous_sidebar", "layout.authenticated_sidebar", "layout.navbar.anonymous", "layout.navbar.authenticated", "layout.scripts"]
services   = ["AuthenticationService"]
signals    = ["user-registered"]
translations = ["es"]
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = ["AuthenticationService"]
templates = ["auth/login_form.html", "auth/signup_form.html"]
models    = ["User"]
hooks     = ["layout.anonymous_sidebar", "layout.authenticated_sidebar", "layout.navbar.anonymous", "layout.navbar.authenticated"]
routes    = true
